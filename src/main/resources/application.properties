spring.application.name=odoru

# MongoDB (local par defaut, surcharge par SPRING_DATA_MONGODB_URI sur Render)
spring.data.mongodb.host=${MONGODB_HOST:localhost}
spring.data.mongodb.port=${MONGODB_PORT:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:odoru}

# Server (port dynamique pour Render, 8080 en local)
server.port=${PORT:8080}
