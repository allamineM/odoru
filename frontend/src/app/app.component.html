<header class="main-header">
  <div class="header-content">
    <div class="logo">
      <span class="logo-icon">🎵</span>
      <div>
        <h1>Odoru</h1>
        <p class="logo-subtitle">Club de danse rythmique</p>
      </div>
    </div>

    <nav class="main-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span>Accueil</span>
      </a>
      <a routerLink="/membres" routerLinkActive="active">
        <span>Membres</span>
      </a>
      <a routerLink="/cours" routerLinkActive="active">
        <span>Cours</span>
      </a>
      <a routerLink="/competitions" routerLinkActive="active">
        <span>Compétitions</span>
      </a>
      <a routerLink="/badges" routerLinkActive="active">
        <span>Badges</span>
      </a>
      <a routerLink="/statistiques" routerLinkActive="active">
        <span>Statistiques</span>
      </a>
    </nav>
  </div>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<footer class="main-footer">
  <div class="footer-content">
    <div>
      <strong>🎵 Odoru</strong> - Club de danse rythmique
      <span class="footer-divider">•</span>
      Projet M1 MIAGE 2026
    </div>
    <div class="footer-tech">
      Spring Boot · MongoDB · Angular
    </div>
  </div>
</footer>
